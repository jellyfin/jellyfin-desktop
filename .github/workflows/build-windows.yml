name: build-windows

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            platform: windows64
            msystem: CLANG64
            pkg_prefix: mingw-w64-clang-x86_64
          - arch: arm64
            runner: windows-11-arm
            platform: windowsarm64
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache CEF
        uses: actions/cache@v5
        with:
          path: |
            third_party/cef
            third_party/cef_binary_*
          key: cef-${{ matrix.platform }}-${{ hashFiles('CEF_VERSION') }}

      - name: Download CEF
        run: |
          python dev/tools/download_cef.py --platform ${{ matrix.platform }}

      - name: Configure (fetch dependencies)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.arch }}
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build MPV
        shell: pwsh
        run: |
          dev\windows\build_mpv_source.ps1 -Arch ${{ matrix.arch }} -Force

      - name: Configure and build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.arch }}
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DEXTERNAL_MPV_DIR=%CD%\third_party\mpv-install
          cmake --build build

      - name: Create package
        shell: cmd
        run: |
          cmake --install build --prefix build/install
          cd build
          cpack -G ZIP -B ../dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.arch }}
          path: dist/JellyfinDesktop-*.zip
